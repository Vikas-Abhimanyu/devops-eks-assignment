version: "3.8"

services:
  backend:
    build: ./backend
    environment:
      - DB_HOST=${RDS_ENDPOINT}
      - DB_NAME=appdb
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

